<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        let marks=[80,90,87,78,95];
        let sum=0;
        for(let i=0;i<marks.length;i++){
            sum=sum+marks[i];
        }
        let avearage=sum/marks.length;
        let percentage=(avearage/100)*100;
        console.log(percentage);
        console.log(avearage);
        console.log(sum);
    </script>
</body>
