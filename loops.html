<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //javascript provides several types of loops to repeadeeatly execute a block of code as long as a specified condition is true. Here are some common types of loops in JavaScript:
        //1. for loop....best used when you know the numbeer of iterations in advance
        let studentslist=["ayush","satyarth","satyam","samay"];
        for(let i=0;i<studentslist.length;i++){
            console.log(studentslist[i]);
        }
        //while loop...best used when you want to repeat a block of code until a certain condition is met
        let x=0;
        while(x<studentslist.length){
            console.log(studentslist[x]);
            x++;
        }
        let details={
            name:"ayush",
            age:21,
            city:"sitapur",
            Profession:"student"
        };
        for(let i in details){
            console.log(details[i]);
        }
    </script>
</body>
</html>
