<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVA SCRIPT</title>
</head>
<body>
    <h1>JAVA SCRIPT VARIABLE</h1>
    <script>
        //var definintion?
        //vars are containers in js
        var myname="ABES";
        document.write(myname);
        console.log(myname);
        //jd execution and scope(global and local)
        function demo(){
            var msg="Thanks";//local
            console.log(msg);
        }
        demo();
        //avr declarion using let and const
        let msg2="Thanks again";
        console.log(msg2);

        const msg3="Thanks to Visit my page";
        console.log(msg3);
    </script>
</body>
</html>
